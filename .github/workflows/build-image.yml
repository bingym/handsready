name: build and push image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: image tag
        required: false
        type: string

env:
  IMAGE_NAME: registry.ap-southeast-1.aliyuncs.com/bingym/treasure_chest_amd64

jobs:
  build_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: registry.ap-southeast-1.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: run build & push script
        run: |
          IMAGE_TAG=${{ inputs.image_tag }}
          commitSha=${{ github.sha }}
          shortSha=${commitSha:0:7}
          if [ -z "$IMAGE_TAG" ];then
            IMAGE_TAG=$(date +%Y%m%d)_${shortSha}
          fi
          DOCKERFILE=Dockerfile
          docker build -t $IMAGE_NAME:$IMAGE_TAG -f $DOCKERFILE . && docker push $IMAGE_NAME:$IMAGE_TAG
