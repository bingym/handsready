{% extends '../layout.html' %}
{% block title %}CloudPad{% endblock %}
{% block description %}CloudPad{% endblock %}
{% block keywords %}CloudPad{% endblock %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-10 mx-auto">
            <h3 class="h3">CloudPad</h3>
            <hr>
            <div class="form-group">
                <input type="text" class="form-control" id="key">
            </div>
            <div class="form-group">
                <button id="go" class="btn btn-primary float-right">进入</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block script %}
{% endblock %}
{% block javascript %}
<script>
    window.onload = () => {
        const oBtn = document.querySelector('#go');
        oBtn.onclick = () => {
            const key = document.querySelector('#key').value;
            if (key) {
                window.location = `/tool/cloudpad/${key}`
            }
        }
    }
</script>
{% endblock %}
